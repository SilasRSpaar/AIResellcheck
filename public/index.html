<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PriceSnap" />
  <meta name="theme-color" content="#6366f1" />
  <title>PriceSnap</title>
  <link rel="manifest" href="/manifest.json" />
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e42;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #f1f1f5;
      --text-muted: #8b8ba7;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #app { min-height: 100vh; display: flex; flex-direction: column; }

    /* HEADER */
    header {
      padding: 16px 20px 12px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { color: var(--accent-light); }
    /* PriceSnap branding */
    .badge {
      margin-left: auto; font-size: 11px;
      background: var(--accent); color: white;
      padding: 3px 8px; border-radius: 20px; font-weight: 600;
    }

    /* MODE SWITCHER */
    .mode-label {
      font-size: 12px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .mode-switcher {
      display: flex;
      background: var(--surface);
      border-radius: 14px;
      padding: 5px;
      gap: 5px;
      border: 1px solid var(--border);
    }
    .mode-btn {
      flex: 1; padding: 13px 8px;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      background: transparent; color: var(--text-muted);
      line-height: 1.3;
    }
    .mode-btn.active {
      background: var(--accent); color: white;
      box-shadow: 0 2px 8px rgba(99,102,241,0.4);
    }

    /* VIEWS */
    .view { display: none; flex-direction: column; flex: 1; padding: 20px; gap: 16px; }
    .view.active { display: flex; }

    /* CAMERA */
    .camera-area {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      aspect-ratio: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; cursor: pointer; transition: border-color 0.2s;
      overflow: hidden; position: relative;
    }
    .camera-area:active { border-color: var(--accent); }

    /* BARCODE SCANNER */
    .scan-mode-row { display: flex; gap: 8px; margin-bottom: 4px; }
    .scan-mode-btn {
      flex: 1; padding: 10px 8px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-muted); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .scan-mode-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    #barcodeScanner { width: 100%; border-radius: var(--radius); overflow: hidden; display: none; }
    #barcodeScanner video { width: 100% !important; border-radius: var(--radius); }
    .barcode-result {
      background: var(--surface); border-radius: var(--radius); padding: 14px;
      border-left: 3px solid var(--green); display: none;
    }
    .barcode-result-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .barcode-result-sub { font-size: 13px; color: var(--text-muted); }
    .camera-area img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    .camera-icon { font-size: 48px; opacity: 0.4; }
    .camera-label { color: var(--text-muted); font-size: 15px; text-align: center; line-height: 1.4; }

    /* INPUTS */
    .btn-row { display: flex; gap: 10px; }
    .btn {
      flex: 1; padding: 15px; border: none;
      border-radius: var(--radius); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-group {
      background: var(--surface); border-radius: var(--radius);
      padding: 16px; display: flex; flex-direction: column; gap: 12px;
    }
    .input-row { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .input-with-currency {
      display: flex; align-items: center;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .currency-tag {
      padding: 0 12px; color: var(--text-muted); font-size: 14px; font-weight: 600;
      border-right: 1px solid var(--border); height: 46px; display: flex; align-items: center;
    }
    input[type="number"] {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 16px; padding: 12px; font-weight: 500; width: 100%;
    }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* MODE HINT */
    .mode-hint {
      background: var(--surface); border-radius: var(--radius);
      padding: 12px 14px; font-size: 13px; color: var(--text-muted);
      border-left: 3px solid var(--accent); line-height: 1.5;
    }

    /* LOADING */
    #loadingView { align-items: center; justify-content: center; gap: 24px; text-align: center; }
    .spinner {
      width: 60px; height: 60px;
      border: 4px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text-muted); font-size: 15px; }

    /* RESULTS */
    .result-header {
      background: var(--surface); border-radius: var(--radius);
      padding: 16px; display: flex; gap: 14px; align-items: center;
    }
    .result-thumb {
      width: 72px; height: 72px; border-radius: 10px;
      object-fit: cover; flex-shrink: 0; background: var(--surface2);
    }
    .result-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .result-category { font-size: 13px; color: var(--text-muted); }

    .verdict-card {
      border-radius: var(--radius); padding: 18px;
      display: flex; align-items: center; gap: 14px;
    }
    .verdict-card.go      { background: #052e16; border: 1px solid #166534; }
    .verdict-card.caution { background: #2d1b06; border: 1px solid #92400e; }
    .verdict-card.stop    { background: #1f0707; border: 1px solid #7f1d1d; }
    .verdict-icon { font-size: 36px; flex-shrink: 0; }
    .verdict-title { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
    .verdict-sub { font-size: 13px; color: var(--text-muted); line-height: 1.4; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-card { background: var(--surface); border-radius: var(--radius); padding: 14px; }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .stat-value { font-size: 20px; font-weight: 700; }
    .stat-value.green { color: var(--green); }
    .stat-value.red   { color: var(--red); }
    .stat-value.yellow{ color: var(--yellow); }
    .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .section-title { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }

    .channels-list { display: flex; flex-direction: column; gap: 8px; }
    .channel-item {
      background: var(--surface); border-radius: 12px;
      padding: 12px 14px; display: flex; align-items: center; justify-content: space-between;
    }
    .channel-name { font-size: 15px; font-weight: 600; }
    .channel-reach { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .channel-tag { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
    .tag-best { background: #052e16; color: var(--green); }
    .tag-good { background: #1c1917; color: var(--yellow); }

    .price-range { background: var(--surface); border-radius: var(--radius); padding: 14px; }
    .price-range-title { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
    .price-range-row { display: flex; justify-content: space-between; align-items: center; }
    .price-min, .price-max { text-align: center; }
    .price-val { font-size: 18px; font-weight: 700; }
    .price-lbl { font-size: 11px; color: var(--text-muted); }
    .price-mid { font-size: 13px; color: var(--text-muted); }

    /* PRICE FAIRNESS INDICATOR */
    .fairness-bar-wrap { background: var(--surface); border-radius: var(--radius); padding: 16px; }
    .fairness-title { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
    .fairness-track {
      position: relative; height: 12px;
      background: linear-gradient(to right, #22c55e 0%, #f59e0b 50%, #ef4444 100%);
      border-radius: 6px; margin-bottom: 8px;
    }
    .fairness-marker {
      position: absolute; top: -4px;
      width: 20px; height: 20px;
      background: white; border: 3px solid var(--accent);
      border-radius: 50%; transform: translateX(-50%);
      transition: left 1s ease;
    }
    .fairness-labels {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--text-muted);
    }

    /* FEES TABLE */
    .fees-card { background: var(--surface); border-radius: var(--radius); padding: 14px; }
    .fees-title { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; font-weight: 600; }
    .fee-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .fee-row:last-child { border-bottom: none; font-weight: 700; color: var(--text); }
    .fee-label { color: var(--text-muted); }
    .fee-val { font-weight: 600; }
    .fee-val.green { color: var(--green); }
    .fee-val.red { color: var(--red); }

    .ai-note {
      background: var(--surface); border-radius: var(--radius);
      padding: 14px; font-size: 14px; line-height: 1.6;
      color: var(--text-muted); border-left: 3px solid var(--accent);
    }

    /* CONDITION PILLS */
    .condition-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .cond-btn {
      flex: 1; min-width: 80px; padding: 10px 8px;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--surface2); color: var(--text-muted);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; text-align: center;
    }
    .cond-btn.active {
      border-color: var(--accent); color: white;
      background: rgba(99,102,241,0.2);
    }

    #fileInput { display: none; }

    .error-box {
      background: #1f0707; border: 1px solid #7f1d1d;
      border-radius: var(--radius); padding: 14px;
      font-size: 14px; color: #fca5a5; line-height: 1.5;
    }

    .bottom-safe { height: env(safe-area-inset-bottom, 20px); }
    .cat-picker { display: flex; flex-wrap: wrap; gap: 8px; }
    .cat-btn { flex: 1 0 calc(25% - 6px); min-width: 70px; padding: 10px 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text-muted); font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; line-height: 1.4; transition: all 0.15s; }
    .cat-btn .cat-icon { font-size: 20px; display: block; margin-bottom: 3px; }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
    .details-toggle { background: none; border: 1px dashed var(--border); border-radius: 10px; color: var(--text-muted); font-size: 13px; font-weight: 600; padding: 10px 14px; width: 100%; cursor: pointer; text-align: left; transition: all 0.2s; }
    .details-toggle:hover { border-color: var(--accent); color: var(--accent-light); }
    .details-fields { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
    .detail-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--text); font-size: 15px; width: 100%; outline: none; }
    .detail-input:focus { border-color: var(--accent); }
    .detail-input::placeholder { color: var(--text-muted); }
    .listing-source { font-size: 10px; font-weight: 700; color: var(--text-muted); background: var(--border); border-radius: 4px; padding: 2px 5px; white-space: nowrap; flex-shrink: 0; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Price<span>Snap</span></div>
    <div class="badge">AI</div>
  </header>

  <!-- SCAN VIEW -->
  <div id="scanView" class="view active">

    <!-- Mode Switcher -->
    <div class="mode-label">Was möchtest du tun?</div>
    <div class="mode-switcher">
      <button class="mode-btn active" id="modeResell" onclick="setMode('resell')">🔄 Kaufen &amp;<br>Weiterverkaufen</button>
      <button class="mode-btn" id="modeFairness" onclick="setMode('fairness')">🔍 Preis<br>überprüfen</button>
    </div>

    <!-- Mode hint -->
    <div class="mode-hint" id="modeHint">
      Kaufe ich es günstig genug, um Gewinn zu machen? Gib Kaufpreis und Zielpreis ein.
    </div>

    <div class="scan-mode-row">
      <button class="scan-mode-btn active" id="btnPhotoMode" onclick="setScanMode('photo')">📷 Foto</button>
      <button class="scan-mode-btn" id="btnBarcodeMode" onclick="setScanMode('barcode')">🔍 Barcode</button>
    </div>
    <div class="camera-area" id="cameraArea" onclick="triggerCamera()">
      <div class="camera-icon">📷</div>
      <div class="camera-label">Foto aufnehmen oder<br>aus Galerie wählen</div>
    </div>
    <div id="barcodeScanner" style="display:none;"></div>
    <div class="barcode-result" id="barcodeResult" style="display:none;">
      <div class="barcode-result-title" id="barcodeProductName">—</div>
      <div class="barcode-result-sub" id="barcodeProductSub">Produkt wird nach Analyse identifiziert…</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="onImageSelected(event)" />

    <!-- Zustandsauswahl (erscheint nach Foto) -->
    <div class="input-group" id="conditionGroup" style="display:none;">
      <div class="input-row">
        <label>Zustand des Objekts</label>
        <div class="condition-pills">
          <button class="cond-btn active" data-val="Sehr gut" onclick="setCondition(this)">✨ Sehr gut</button>
          <button class="cond-btn" data-val="Gut" onclick="setCondition(this)">👍 Gut</button>
          <button class="cond-btn" data-val="Akzeptabel" onclick="setCondition(this)">👌 Akzeptabel</button>
          <button class="cond-btn" data-val="Beschädigt" onclick="setCondition(this)">⚠️ Beschädigt</button>
        </div>
      </div>
    </div>

    <!-- Optional detail inputs (erscheint nach Foto) -->
    <div id="detailsSection" style="display:none;">
      <button class="details-toggle" onclick="toggleDetails()" id="detailsToggleBtn">＋ Angaben verfeinern (optional)</button>
      <div id="detailsFields" style="display:none;" class="details-fields">
        <div>
          <label style="margin-bottom:8px;display:block;">Kategorie</label>
          <div class="cat-picker" id="catPicker">
            <button class="cat-btn" data-cat="Elektronik" onclick="setCategory(this)"><span class="cat-icon">📱</span>Elektronik</button>
            <button class="cat-btn" data-cat="Kleidung" onclick="setCategory(this)"><span class="cat-icon">👕</span>Kleidung</button>
            <button class="cat-btn" data-cat="Schuhe" onclick="setCategory(this)"><span class="cat-icon">👟</span>Schuhe</button>
            <button class="cat-btn" data-cat="Spielzeug" onclick="setCategory(this)"><span class="cat-icon">🧸</span>Spielzeug</button>
            <button class="cat-btn" data-cat="Buecher" onclick="setCategory(this)"><span class="cat-icon">📚</span>Bücher</button>
            <button class="cat-btn" data-cat="Haushalt" onclick="setCategory(this)"><span class="cat-icon">🏠</span>Haushalt</button>
            <button class="cat-btn" data-cat="Moebel" onclick="setCategory(this)"><span class="cat-icon">🪑</span>Möbel</button>
            <button class="cat-btn" data-cat="Schmuck" onclick="setCategory(this)"><span class="cat-icon">💍</span>Schmuck</button>
            <button class="cat-btn" data-cat="Uhren" onclick="setCategory(this)"><span class="cat-icon">⌚</span>Uhren</button>
            <button class="cat-btn" data-cat="Sport" onclick="setCategory(this)"><span class="cat-icon">⚽</span>Sport</button>
            <button class="cat-btn" data-cat="Musik" onclick="setCategory(this)"><span class="cat-icon">🎵</span>Musik</button>
            <button class="cat-btn" data-cat="Sonstiges" onclick="setCategory(this)"><span class="cat-icon">📦</span>Sonstiges</button>
          </div>
        </div>
        <input class="detail-input" type="text" id="userBrand" placeholder="Marke (z.B. Nike, Sony, Lego, Ikea)" />
        <input class="detail-input" type="text" id="userModel" placeholder="Modell / Beschreibung (z.B. Air Max 90)" />
        <input class="detail-input" type="text" id="userYear" placeholder="Jahr (z.B. 2021) – optional" />
        <input class="detail-input" type="text" id="userSize" placeholder="Grösse / Variante (z.B. 42, M, 128GB) – optional" />
      </div>
    </div>

    <!-- Resell inputs -->
    <div class="input-group" id="inputsResell">
      <div class="input-row">
        <label>Kaufpreis (was du bezahlst)</label>
        <div class="input-with-currency">
          <span class="currency-tag">CHF</span>
          <input type="number" id="buyPrice" placeholder="0.00" min="0" step="0.01" />
        </div>
      </div>
      <div class="input-row">
        <label>Zielpreis (was du verlangen willst)</label>
        <div class="input-with-currency">
          <span class="currency-tag">CHF</span>
          <input type="number" id="sellPrice" placeholder="0.00" min="0" step="0.01" />
        </div>
      </div>
    </div>

    <!-- Fairness inputs -->
    <div class="input-group" id="inputsFairness" style="display:none;">
      <div class="input-row">
        <label>Verlangter Preis (was der Verkäufer will)</label>
        <div class="input-with-currency">
          <span class="currency-tag">CHF</span>
          <input type="number" id="askedPrice" placeholder="0.00" min="0" step="0.01" />
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="triggerCamera()">📷 Foto</button>
      <button class="btn btn-primary" id="analyzeBtn" onclick="startAnalysis()" disabled>Analysieren →</button>
    </div>
    <div class="bottom-safe"></div>
  </div>

  <!-- LOADING VIEW -->
  <div id="loadingView" class="view">
    <div class="spinner"></div>
    <div>
      <div style="font-size:18px;font-weight:700;margin-bottom:6px;">Analysiere Objekt…</div>
      <div class="loading-text" id="loadingStep">KI erkennt Objekt</div>
    </div>
    <div class="bottom-safe"></div>
  </div>

  <!-- RESULT VIEW -->
  <div id="resultView" class="view">
    <div id="resultContent"></div>
    <button class="btn btn-secondary" onclick="resetApp()">← Neues Objekt scannen</button>
    <div class="bottom-safe"></div>
  </div>
</div>

<script>
  let selectedImage = null;
  let imageBase64 = null;
  let detectedBarcode = null;
  let html5QrCode = null;
  let currentMode = 'resell'; // 'resell' | 'fairness'
  let selectedCondition = 'Sehr gut';
  let selectedCategory = null;

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('modeResell').classList.toggle('active', mode === 'resell');
    document.getElementById('modeFairness').classList.toggle('active', mode === 'fairness');
    document.getElementById('inputsResell').style.display  = mode === 'resell'   ? '' : 'none';
    document.getElementById('inputsFairness').style.display = mode === 'fairness' ? '' : 'none';
    document.getElementById('modeHint').textContent = mode === 'resell'
      ? 'Kaufe ich es günstig genug, um Gewinn zu machen? Gib Kaufpreis und Zielpreis ein.'
      : 'Ist der verlangte Preis fair? Gib den Preis ein den der Verkäufer verlangt.';
  }

  function triggerCamera() {
    document.getElementById('fileInput').click();
  }

  // ── Barcode Scanner ──────────────────────────────────────────────
  let scanMode = 'photo';

  function setScanMode(mode) {
    scanMode = mode;
    document.getElementById('btnPhotoMode').classList.toggle('active', mode === 'photo');
    document.getElementById('btnBarcodeMode').classList.toggle('active', mode === 'barcode');
    const cameraArea = document.getElementById('cameraArea');
    const scannerDiv = document.getElementById('barcodeScanner');
    if (mode === 'barcode') {
      cameraArea.style.display = 'none';
      scannerDiv.style.display = 'block';
      startBarcodeScanner();
    } else {
      stopBarcodeScanner();
      cameraArea.style.display = '';
      scannerDiv.style.display = 'none';
      document.getElementById('barcodeResult').style.display = 'none';
      detectedBarcode = null;
    }
    updateAnalyzeBtn();
  }

  function startBarcodeScanner() {
    detectedBarcode = null;
    if (!html5QrCode) {
      html5QrCode = new Html5Qrcode('barcodeScanner');
    }
    html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 240, height: 120 }, aspectRatio: 1.5 },
      (decodedText) => {
        detectedBarcode = decodedText;
        stopBarcodeScanner();
        showBarcodeDetected(decodedText);
        updateAnalyzeBtn();
      },
      () => {}
    ).catch(err => {
      console.error('Scanner error:', err);
      document.getElementById('barcodeScanner').innerHTML =
        '<p style="padding:20px;color:var(--text-muted);text-align:center">Kamera-Zugriff verweigert oder nicht verfügbar</p>';
    });
  }

  function stopBarcodeScanner() {
    if (html5QrCode && html5QrCode.isScanning) {
      html5QrCode.stop().catch(() => {});
    }
  }

  function showBarcodeDetected(barcode) {
    document.getElementById('barcodeScanner').style.display = 'none';
    const resultDiv = document.getElementById('barcodeResult');
    resultDiv.style.display = 'block';
    document.getElementById('barcodeProductName').textContent = '✅ Barcode erkannt: ' + barcode;
    document.getElementById('barcodeProductSub').textContent = 'Produkt wird nach der Analyse identifiziert…';
  }
  // ── End Barcode Scanner ───────────────────────────────────────────

  function onImageSelected(event) {
    const file = event.target.files[0];
    if (!file) return;
    selectedImage = file;
    const reader = new FileReader();
    reader.onload = (e) => {
      const rawSrc = e.target.result;
      // Compress image to max 1200px and 80% quality to stay under Vercel 4.5MB limit
      const imgEl = new Image();
      imgEl.onload = () => {
        const MAX = 1200;
        let w = imgEl.width, h = imgEl.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(imgEl, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.80);
        imageBase64 = compressed.split(',')[1];
        const preview = document.createElement('img');
        preview.src = compressed;
        const area = document.getElementById('cameraArea');
        area.innerHTML = '';
        area.appendChild(preview);
        updateAnalyzeBtn();
      };
      imgEl.src = rawSrc;
    };
    reader.readAsDataURL(file);
  }

  function updateAnalyzeBtn() {
    const ready = !!(imageBase64 || detectedBarcode);
    document.getElementById('analyzeBtn').disabled = !ready;
    document.getElementById('conditionGroup').style.display = ready ? '' : 'none';
    document.getElementById('detailsSection').style.display = ready ? '' : 'none';
  }

  function toggleDetails() {
    const fields = document.getElementById('detailsFields');
    const btn = document.getElementById('detailsToggleBtn');
    const open = fields.style.display === 'none';
    fields.style.display = open ? '' : 'none';
    btn.textContent = open ? '－ Angaben verfeinern' : '＋ Angaben verfeinern (optional)';
  }

  function setCategory(btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCategory = btn.dataset.cat;
  }

  function setCondition(btn) {
    document.querySelectorAll('.cond-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCondition = btn.dataset.val;
  }

  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  const loadingSteps = [
    'KI erkennt Objekt…',
    'Marktpreise werden abgefragt…',
    'Neupreis wird recherchiert…',
    'Nachfrage wird analysiert…',
    'Preis wird bewertet…',
    'Ergebnis wird aufbereitet…',
  ];

  async function startAnalysis() {
    if (!imageBase64 && !detectedBarcode) return;

    const buyPrice   = parseFloat(document.getElementById('buyPrice').value)   || 0;
    const sellPrice  = parseFloat(document.getElementById('sellPrice').value)  || 0;
    const askedPrice = parseFloat(document.getElementById('askedPrice').value) || 0;

    showView('loadingView');
    let stepIdx = 0;
    const stepEl = document.getElementById('loadingStep');
    const stepInterval = setInterval(() => {
      stepIdx = (stepIdx + 1) % loadingSteps.length;
      stepEl.textContent = loadingSteps[stepIdx];
    }, 1800);

    try {
      const response = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          image: imageBase64 || null,
          barcode: detectedBarcode || null,
          mode: currentMode, buyPrice, sellPrice, askedPrice,
          condition: selectedCondition,
          userBrand: document.getElementById('userBrand').value.trim() || null,
          userModel: document.getElementById('userModel').value.trim() || null,
          userYear: document.getElementById('userYear').value.trim() || null,
          userSize: document.getElementById('userSize').value.trim() || null,
          userCategory: selectedCategory || null,
        }),
      });

      clearInterval(stepInterval);

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error || 'Server-Fehler');
      }

      const data = await response.json();
      currentMode === 'resell' ? renderResellResult(data, buyPrice, sellPrice) : renderFairnessResult(data, askedPrice);

    } catch (err) {
      clearInterval(stepInterval);
      showView('resultView');
      document.getElementById('resultContent').innerHTML = `
        <div class="error-box">
          <strong>Fehler bei der Analyse</strong><br>${err.message}<br><br>
          Bitte prüfe deine API Keys in den Vercel Einstellungen.
        </div>`;
    }
  }

  // ── RESELL RESULT ──────────────────────────────────────────────────────────
  function renderResellResult(data, buyPrice, sellPrice) {
    const profit = sellPrice - buyPrice;
    const roi = buyPrice > 0 ? ((profit / buyPrice) * 100).toFixed(0) : 0;
    const profitColor = profit > 0 ? 'green' : profit < 0 ? 'red' : '';

    let verdict;
    if (profit > 0 && data.demandScore >= 60)      verdict = { icon: '✅', title: 'Guter Deal',       sub: 'Hohe Nachfrage und positiver Gewinn.',              cls: 'go' };
    else if (profit > 0 && data.demandScore >= 30) verdict = { icon: '⚠️', title: 'Mittelmässig',     sub: 'Gewinn möglich, aber Nachfrage verhalten.',         cls: 'caution' };
    else if (profit <= 0)                          verdict = { icon: '🚫', title: 'Kein Gewinn',       sub: 'Kaufpreis ist zu hoch für diesen Zielpreis.',       cls: 'stop' };
    else                                           verdict = { icon: '⚠️', title: 'Niedriges Interesse', sub: 'Schwierig zu verkaufen, Geduld nötig.',          cls: 'caution' };

    const demandColor = data.demandScore >= 70 ? '#22c55e' : data.demandScore >= 40 ? '#f59e0b' : '#ef4444';
    const channelsHtml = (data.channels || []).map((ch, i) => `
      <div class="channel-item">
        <div><div class="channel-name">${ch.name}</div><div class="channel-reach">${ch.reason}</div></div>
        <span class="channel-tag ${i === 0 ? 'tag-best' : 'tag-good'}">${i === 0 ? 'Beste Wahl' : 'Gut'}</span>
      </div>`).join('');

    const thumb = imageBase64 ? `<img class="result-thumb" src="data:image/jpeg;base64,${imageBase64}" />` : '';

    document.getElementById('resultContent').innerHTML = `
      <div class="result-header">
        ${thumb}
        <div><div class="result-title">${data.objectName || 'Objekt'}</div><div class="result-category">${data.category || ''}</div></div>
      </div>
      <div class="verdict-card ${verdict.cls}">
        <div class="verdict-icon">${verdict.icon}</div>
        <div><div class="verdict-title">${verdict.title}</div><div class="verdict-sub">${verdict.sub}</div></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Dein Gewinn</div>
          <div class="stat-value ${profitColor}">CHF ${profit.toFixed(2)}</div>
          <div class="stat-sub">ROI: ${roi}%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Verkaufsdauer</div>
          <div class="stat-value">${data.timeToSell || '–'}</div>
          <div class="stat-sub">Schätzung</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">📦 Gebrauchtmarkt-Ø</div>
          <div class="stat-value">CHF ${data.marketAvg || '–'}</div>
          <div class="stat-sub">eBay aktive Listings</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">🏷️ Neupreis</div>
          <div class="stat-value" style="color:var(--text-muted)">${data.retailPrice ? 'CHF ~' + parseFloat(data.retailPrice).toFixed(0) : '–'}</div>
          <div class="stat-sub">${data.retailPrice ? (data.retailConfidence === 'high' ? 'Richtpreis' : 'KI-Schätzung') : 'Nicht verfügbar'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Nachfrage</div>
          <div class="stat-value" style="color:${demandColor}">${data.demandScore || 0}/100</div>
          <div class="stat-sub">${data.demandLabel || ''}</div>
        </div>
      </div>
      <div class="price-range">
        <div class="price-range-title">Marktpreis-Spanne</div>
        <div class="price-range-row">
          <div class="price-min"><div class="price-val">CHF ${data.priceMin || '–'}</div><div class="price-lbl">Minimum</div></div>
          <div class="price-mid">↔</div>
          <div class="price-max"><div class="price-val">CHF ${data.priceMax || '–'}</div><div class="price-lbl">Maximum</div></div>
        </div>
      </div>
      <div>
        <div class="section-title" style="margin-bottom:8px;">Empfohlene Verkaufskanäle</div>
        <div class="channels-list">${channelsHtml}</div>
      </div>
      ${sellPrice > 0 ? renderFees(sellPrice, data.channels) : ''}

      ${renderListings(data.topListings)}
      ${data.aiNote ? `<div class="ai-note">💡 ${data.aiNote}</div>` : ''}
    `;
    showView('resultView');
  }

  function renderFees(sellPrice, channels) {
    const fees = [
      { name: 'Ricardo.ch', rate: 0.08 },
      { name: 'eBay.de', rate: 0.13 },
      { name: 'Vinted', rate: 0.05 },
    ];
    const rows = fees.map(f => {
      const fee = sellPrice * f.rate;
      const net = sellPrice - fee;
      return `<div class="fee-row">
        <span class="fee-label">${f.name} (${(f.rate*100).toFixed(0)}% Gebühr)</span>
        <span class="fee-val">CHF ${net.toFixed(2)} netto</span>
      </div>`;
    }).join('');
    return `<div class="fees-card">
      <div class="fees-title">💰 Netto-Erlös nach Plattformgebühren</div>
      ${rows}
    </div>`;
  }

  // ── FAIRNESS RESULT ────────────────────────────────────────────────────────
  function renderFairnessResult(data, askedPrice) {
    const avg = parseFloat(data.marketAvg) || 0;
    const min = parseFloat(data.priceMin)  || 0;
    const max = parseFloat(data.priceMax)  || 0;

    // Fairness score: 0 = Schnäppchen, 100 = viel zu teuer
    let fairnessScore = 50;
    let verdict;
    const hasMarketData = avg > 0;
    if (hasMarketData) {
      const ratio = askedPrice / avg;
      fairnessScore = Math.min(100, Math.max(0, Math.round((ratio - 0.5) * 100)));
      if (ratio <= 0.75)       verdict = { icon: '🤑', title: 'Schnäppchen!',      sub: `Deutlich unter Marktpreis (Ø CHF ${avg}).`,      cls: 'go' };
      else if (ratio <= 0.95)  verdict = { icon: '✅', title: 'Fairer Preis',       sub: `Leicht unter Marktpreis (Ø CHF ${avg}).`,        cls: 'go' };
      else if (ratio <= 1.10)  verdict = { icon: '👍', title: 'Marktkonform',       sub: `Entspricht dem Marktpreis (Ø CHF ${avg}).`,      cls: 'caution' };
      else if (ratio <= 1.35)  verdict = { icon: '⚠️', title: 'Leicht überteuert', sub: `Etwas über Marktpreis (Ø CHF ${avg}).`,          cls: 'caution' };
      else                     verdict = { icon: '🚫', title: 'Zu teuer',           sub: `Deutlich über Marktpreis (Ø CHF ${avg}).`,       cls: 'stop' };
    } else {
      verdict = { icon: '❓', title: 'Zu wenig Daten', sub: 'Kein direkter Marktvergleich möglich. Siehe AI-Einschätzung unten.', cls: 'caution' };
    }

    const diff = avg > 0 ? (askedPrice - avg).toFixed(2) : null;
    const diffColor = diff < 0 ? 'green' : diff > 0 ? 'red' : '';
    const diffLabel = diff < 0 ? `CHF ${Math.abs(diff)} unter Markt` : diff > 0 ? `CHF ${diff} über Markt` : 'Marktkonform';

    const thumb = imageBase64 ? `<img class="result-thumb" src="data:image/jpeg;base64,${imageBase64}" />` : '';

    // Marker position: fairnessScore 0-100 → left 5%-95%
    const markerLeft = Math.round(5 + (fairnessScore / 100) * 90);

    document.getElementById('resultContent').innerHTML = `
      <div class="result-header">
        ${thumb}
        <div><div class="result-title">${data.objectName || 'Objekt'}</div><div class="result-category">${data.category || ''}</div></div>
      </div>
      <div class="verdict-card ${verdict.cls}">
        <div class="verdict-icon">${verdict.icon}</div>
        <div><div class="verdict-title">${verdict.title}</div><div class="verdict-sub">${verdict.sub}</div></div>
      </div>

      ${hasMarketData ? `
      <div class="fairness-bar-wrap">
        <div class="fairness-title">Preisposition im Markt</div>
        <div class="fairness-track">
          <div class="fairness-marker" style="left: ${markerLeft}%"></div>
        </div>
        <div class="fairness-labels">
          <span>🤑 Schnäppchen</span>
          <span>Fair</span>
          <span>🚫 Zu teuer</span>
        </div>
      </div>` : ''}

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Verlangter Preis</div>
          <div class="stat-value">CHF ${askedPrice.toFixed(2)}</div>
          <div class="stat-sub">${avg > 0 ? diffLabel : '–'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">📦 Gebrauchtmarkt-Ø</div>
          <div class="stat-value">CHF ${avg > 0 ? avg.toFixed(2) : '–'}</div>
          <div class="stat-sub">eBay aktive Listings</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">🏷️ Neupreis</div>
          <div class="stat-value" style="color:var(--text-muted)">${data.retailPrice ? 'CHF ~' + parseFloat(data.retailPrice).toFixed(0) : '–'}</div>
          <div class="stat-sub">${data.retailPrice ? (data.retailConfidence === 'high' ? 'Richtpreis' : 'KI-Schätzung') : 'Nicht verfügbar'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Du sparst / zahlst mehr</div>
          <div class="stat-value ${diffColor}">${avg > 0 ? (diff < 0 ? '−' : '+') + 'CHF ' + Math.abs(diff) : '–'}</div>
          <div class="stat-sub">vs. Gebrauchtmarkt</div>
        </div>
      </div>

      <div class="price-range">
        <div class="price-range-title">Marktpreis-Spanne</div>
        <div class="price-range-row">
          <div class="price-min"><div class="price-val">CHF ${data.priceMin || '–'}</div><div class="price-lbl">Minimum</div></div>
          <div class="price-mid">↔</div>
          <div class="price-max"><div class="price-val">CHF ${data.priceMax || '–'}</div><div class="price-lbl">Maximum</div></div>
        </div>
      </div>

      ${data.aiNote ? `<div class="ai-note">💡 ${data.aiNote}</div>` : ''}
    `;
    showView('resultView');
  }

  function renderListings(listings) {
    if (!listings || listings.length === 0) return '';
    const items = listings.map(l => {
      const priceStr = 'CHF ' + parseFloat(l.price).toFixed(0);
      const badge = l.source ? '<span class="listing-source">' + l.source + '</span>' : '';
      if (l.url) {
        return '<a class="listing-item" href="' + l.url + '" target="_blank" rel="noopener">' +
          badge +
          '<span class="listing-title">' + l.title + '</span>' +
          '<span class="listing-price">' + priceStr + '</span>' +
          '<span class="listing-arrow">↗</span>' +
          '</a>';
      }
      return '<div class="listing-item">' +
        badge +
        '<span class="listing-title">' + l.title + '</span>' +
        '<span class="listing-price">' + priceStr + '</span>' +
        '</div>';
    }).join('');
    return '<div class="listings-section"><div class="listings-title">Ähnliche Angebote</div>' + items + '</div>';
  }

  function resetApp() {
    selectedImage = null; imageBase64 = null; detectedBarcode = null; selectedCondition = 'Sehr gut';
    stopBarcodeScanner();
    setScanMode('photo');
    document.getElementById('fileInput').value = '';
    document.getElementById('buyPrice').value   = '';
    document.getElementById('sellPrice').value  = '';
    document.getElementById('askedPrice').value = '';
    document.getElementById('userBrand').value = '';
    document.getElementById('userModel').value = '';
    document.getElementById('userYear').value = '';
    document.getElementById('userSize').value = '';
    document.getElementById('detailsFields').style.display = 'none';
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    selectedCategory = null;
    document.getElementById('detailsToggleBtn').textContent = '＋ Angaben verfeinern (optional)';
    document.getElementById('detailsSection').style.display = 'none';
    document.getElementById('conditionGroup').style.display = 'none';
    document.querySelectorAll('.cond-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    const area = document.getElementById('cameraArea');
    area.innerHTML = `<div class="camera-icon">📷</div><div class="camera-label">Foto aufnehmen oder<br>aus Galerie wählen</div>`;
    document.getElementById('analyzeBtn').disabled = true;
    showView('scanView');
  }
</script>
</body>
</html>
