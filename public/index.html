<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ResellCheck" />
  <meta name="theme-color" content="#6366f1" />
  <title>ResellCheck</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e42;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #f1f1f5;
      --text-muted: #8b8ba7;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { color: var(--accent-light); }
    .badge {
      margin-left: auto;
      font-size: 11px;
      background: var(--accent);
      color: white;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    /* VIEWS */
    .view { display: none; flex-direction: column; flex: 1; padding: 20px; gap: 16px; }
    .view.active { display: flex; }

    /* SCAN VIEW */
    .camera-area {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
      overflow: hidden;
      position: relative;
    }
    .camera-area:active { border-color: var(--accent); }
    .camera-area img {
      width: 100%; height: 100%;
      object-fit: cover;
      position: absolute; top: 0; left: 0;
    }
    .camera-icon { font-size: 48px; opacity: 0.4; }
    .camera-label { color: var(--text-muted); font-size: 15px; text-align: center; line-height: 1.4; }

    .btn-row { display: flex; gap: 10px; }
    .btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* PRICE INPUTS */
    .input-group {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .input-row { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .input-with-currency {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .currency-tag {
      padding: 0 12px;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      border-right: 1px solid var(--border);
      height: 46px;
      display: flex;
      align-items: center;
    }
    input[type="number"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 16px;
      padding: 12px;
      font-weight: 500;
      width: 100%;
    }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* LOADING */
    #loadingView {
      align-items: center;
      justify-content: center;
      gap: 24px;
      text-align: center;
    }
    .spinner {
      width: 60px; height: 60px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text-muted); font-size: 15px; }

    /* RESULT VIEW */
    .result-header {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .result-thumb {
      width: 72px; height: 72px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }
    .result-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .result-category { font-size: 13px; color: var(--text-muted); }

    .verdict-card {
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .verdict-card.go { background: #052e16; border: 1px solid #166534; }
    .verdict-card.caution { background: #2d1b06; border: 1px solid #92400e; }
    .verdict-card.stop { background: #1f0707; border: 1px solid #7f1d1d; }
    .verdict-icon { font-size: 36px; flex-shrink: 0; }
    .verdict-title { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
    .verdict-sub { font-size: 13px; color: var(--text-muted); line-height: 1.4; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
    }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .stat-value { font-size: 20px; font-weight: 700; }
    .stat-value.green { color: var(--green); }
    .stat-value.red { color: var(--red); }
    .stat-value.yellow { color: var(--yellow); }
    .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .section-title { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }

    .channels-list { display: flex; flex-direction: column; gap: 8px; }
    .channel-item {
      background: var(--surface);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .channel-name { font-size: 15px; font-weight: 600; }
    .channel-reach { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .channel-tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .tag-best { background: #052e16; color: var(--green); }
    .tag-good { background: #1c1917; color: var(--yellow); }

    .demand-bar-wrap { background: var(--surface); border-radius: var(--radius); padding: 14px; }
    .demand-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .demand-label { font-size: 14px; font-weight: 600; }
    .demand-score { font-size: 14px; font-weight: 700; }
    .demand-bar-bg { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .demand-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }

    .price-range { background: var(--surface); border-radius: var(--radius); padding: 14px; }
    .price-range-title { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
    .price-range-row { display: flex; justify-content: space-between; align-items: center; }
    .price-min, .price-max { text-align: center; }
    .price-val { font-size: 18px; font-weight: 700; }
    .price-lbl { font-size: 11px; color: var(--text-muted); }
    .price-mid { font-size: 13px; color: var(--text-muted); }

    .ai-note { background: var(--surface); border-radius: var(--radius); padding: 14px; font-size: 14px; line-height: 1.6; color: var(--text-muted); border-left: 3px solid var(--accent); }

    /* Hidden file input */
    #fileInput { display: none; }

    /* Error */
    .error-box {
      background: #1f0707;
      border: 1px solid #7f1d1d;
      border-radius: var(--radius);
      padding: 14px;
      font-size: 14px;
      color: #fca5a5;
      line-height: 1.5;
    }

    .bottom-safe { height: env(safe-area-inset-bottom, 20px); }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Resell<span>Check</span></div>
    <div class="badge">AI</div>
  </header>

  <!-- SCAN VIEW -->
  <div id="scanView" class="view active">
    <div class="camera-area" id="cameraArea" onclick="triggerCamera()">
      <div class="camera-icon">📷</div>
      <div class="camera-label">Foto aufnehmen oder<br>aus Galerie wählen</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="onImageSelected(event)" />

    <div class="input-group">
      <div class="input-row">
        <label>Kaufpreis (was du bezahlst)</label>
        <div class="input-with-currency">
          <span class="currency-tag">CHF</span>
          <input type="number" id="buyPrice" placeholder="0.00" min="0" step="0.01" />
        </div>
      </div>
      <div class="input-row">
        <label>Zielpreis (was du verlangen willst)</label>
        <div class="input-with-currency">
          <span class="currency-tag">CHF</span>
          <input type="number" id="sellPrice" placeholder="0.00" min="0" step="0.01" />
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="triggerCamera()">📷 Foto</button>
      <button class="btn btn-primary" id="analyzeBtn" onclick="startAnalysis()" disabled>Analysieren →</button>
    </div>
    <div class="bottom-safe"></div>
  </div>

  <!-- LOADING VIEW -->
  <div id="loadingView" class="view">
    <div class="spinner"></div>
    <div>
      <div style="font-size:18px;font-weight:700;margin-bottom:6px;">Analysiere Objekt…</div>
      <div class="loading-text" id="loadingStep">KI erkennt Objekt</div>
    </div>
    <div class="bottom-safe"></div>
  </div>

  <!-- RESULT VIEW -->
  <div id="resultView" class="view">
    <div id="resultContent"></div>
    <button class="btn btn-secondary" onclick="resetApp()">← Neues Objekt scannen</button>
    <div class="bottom-safe"></div>
  </div>

</div>

<script>
  let selectedImage = null;
  let imageBase64 = null;

  // Register Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  function triggerCamera() {
    document.getElementById('fileInput').click();
  }

  function onImageSelected(event) {
    const file = event.target.files[0];
    if (!file) return;
    selectedImage = file;

    const reader = new FileReader();
    reader.onload = (e) => {
      imageBase64 = e.target.result.split(',')[1];
      const img = document.createElement('img');
      img.src = e.target.result;
      const area = document.getElementById('cameraArea');
      area.innerHTML = '';
      area.appendChild(img);
    };
    reader.readAsDataURL(file);
    updateAnalyzeBtn();
  }

  function updateAnalyzeBtn() {
    const btn = document.getElementById('analyzeBtn');
    btn.disabled = !imageBase64;
  }

  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  const loadingSteps = [
    'KI erkennt Objekt…',
    'Marktpreise werden abgefragt…',
    'Nachfrage wird analysiert…',
    'Verkaufskanäle werden bewertet…',
    'Gewinn wird kalkuliert…',
  ];

  async function startAnalysis() {
    if (!imageBase64) return;

    const buyPrice = parseFloat(document.getElementById('buyPrice').value) || 0;
    const sellPrice = parseFloat(document.getElementById('sellPrice').value) || 0;

    showView('loadingView');

    // Cycle through loading messages
    let stepIdx = 0;
    const stepEl = document.getElementById('loadingStep');
    const stepInterval = setInterval(() => {
      stepIdx = (stepIdx + 1) % loadingSteps.length;
      stepEl.textContent = loadingSteps[stepIdx];
    }, 1800);

    try {
      const response = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: imageBase64, buyPrice, sellPrice }),
      });

      clearInterval(stepInterval);

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error || 'Server-Fehler');
      }

      const data = await response.json();
      renderResult(data, buyPrice, sellPrice);
    } catch (err) {
      clearInterval(stepInterval);
      showView('resultView');
      document.getElementById('resultContent').innerHTML = `
        <div class="error-box">
          <strong>Fehler bei der Analyse</strong><br>${err.message}<br><br>
          Bitte prüfe deine API Keys in den Vercel Einstellungen.
        </div>`;
    }
  }

  function renderResult(data, buyPrice, sellPrice) {
    const profit = sellPrice - buyPrice;
    const roi = buyPrice > 0 ? ((profit / buyPrice) * 100).toFixed(0) : 0;
    const profitColor = profit > 0 ? 'green' : profit < 0 ? 'red' : '';

    let verdict, verdictClass;
    if (profit > 0 && data.demandScore >= 60) {
      verdict = { icon: '✅', title: 'Guter Deal', sub: 'Hohe Nachfrage und positiver Gewinn.', cls: 'go' };
    } else if (profit > 0 && data.demandScore >= 30) {
      verdict = { icon: '⚠️', title: 'Mittelmässig', sub: 'Gewinn möglich, aber Nachfrage verhalten.', cls: 'caution' };
    } else if (profit <= 0) {
      verdict = { icon: '🚫', title: 'Kein Gewinn', sub: 'Kaufpreis ist zu hoch für diesen Zielpreis.', cls: 'stop' };
    } else {
      verdict = { icon: '⚠️', title: 'Niedriges Interesse', sub: 'Schwierig zu verkaufen, Geduld nötig.', cls: 'caution' };
    }

    const demandColor = data.demandScore >= 70 ? '#22c55e' : data.demandScore >= 40 ? '#f59e0b' : '#ef4444';

    const channelsHtml = (data.channels || []).map((ch, i) => `
      <div class="channel-item">
        <div>
          <div class="channel-name">${ch.name}</div>
          <div class="channel-reach">${ch.reason}</div>
        </div>
        <span class="channel-tag ${i === 0 ? 'tag-best' : 'tag-good'}">${i === 0 ? 'Beste Wahl' : 'Gut'}</span>
      </div>`).join('');

    const thumb = imageBase64 ? `<img class="result-thumb" src="data:image/jpeg;base64,${imageBase64}" />` : '';

    document.getElementById('resultContent').innerHTML = `
      <div class="result-header">
        ${thumb}
        <div>
          <div class="result-title">${data.objectName || 'Objekt'}</div>
          <div class="result-category">${data.category || ''}</div>
        </div>
      </div>

      <div class="verdict-card ${verdict.cls}">
        <div class="verdict-icon">${verdict.icon}</div>
        <div>
          <div class="verdict-title">${verdict.title}</div>
          <div class="verdict-sub">${verdict.sub}</div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Dein Gewinn</div>
          <div class="stat-value ${profitColor}">CHF ${profit.toFixed(2)}</div>
          <div class="stat-sub">ROI: ${roi}%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Verkaufsdauer</div>
          <div class="stat-value">${data.timeToSell || '–'}</div>
          <div class="stat-sub">Schätzung</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Markt-Ø Preis</div>
          <div class="stat-value">CHF ${data.marketAvg || '–'}</div>
          <div class="stat-sub">Aktuell</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Nachfrage</div>
          <div class="stat-value" style="color:${demandColor}">${data.demandScore || 0}/100</div>
          <div class="stat-sub">${data.demandLabel || ''}</div>
        </div>
      </div>

      <div class="price-range">
        <div class="price-range-title">Marktpreis-Spanne</div>
        <div class="price-range-row">
          <div class="price-min">
            <div class="price-val">CHF ${data.priceMin || '–'}</div>
            <div class="price-lbl">Minimum</div>
          </div>
          <div class="price-mid">↔</div>
          <div class="price-max">
            <div class="price-val">CHF ${data.priceMax || '–'}</div>
            <div class="price-lbl">Maximum</div>
          </div>
        </div>
      </div>

      <div>
        <div class="section-title" style="margin-bottom:8px;">Empfohlene Verkaufskanäle</div>
        <div class="channels-list">${channelsHtml}</div>
      </div>

      ${data.aiNote ? `<div class="ai-note">💡 ${data.aiNote}</div>` : ''}
    `;

    showView('resultView');
  }

  function resetApp() {
    selectedImage = null;
    imageBase64 = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('buyPrice').value = '';
    document.getElementById('sellPrice').value = '';
    const area = document.getElementById('cameraArea');
    area.innerHTML = `<div class="camera-icon">📷</div><div class="camera-label">Foto aufnehmen oder<br>aus Galerie wählen</div>`;
    document.getElementById('analyzeBtn').disabled = true;
    showView('scanView');
  }
</script>
</body>
</html>
