workflows:
  ios-testflight:
    name: Comparadoo iOS TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - Beta Tester
      vars:
        BUNDLE_ID: com.comparadoo.app
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        APP_STORE_CONNECT_ISSUER_ID: "5e83f2da-7fb5-42f6-aa51-6d223426eb20"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "ZS6S52CKNU"
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
          chmod +x node_modules/.bin/cap || true
      - name: Add iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Beta Tester
