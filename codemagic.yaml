workflows:
  ios-testflight:
    name: Comparadoo iOS TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - Beta Tester
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.comparadoo.app
      vars:
        BUNDLE_ID: com.comparadoo.app
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Add iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Beta Tester
