workflows:
  ios-testflight:
    name: Comparadoo iOS TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - Beta Tester
      vars:
        BUNDLE_ID: com.comparadoo.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
          chmod +x node_modules/.bin/cap || true
      - name: Add iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Initialize keychain
        script: keychain initialize
      - name: Generate certificate private key
        script: |
          CERT_KEY=$(openssl genrsa 2048)
          echo "CERTIFICATE_PRIVATE_KEY<<EOF" >> $CM_ENV
          echo "$CERT_KEY" >> $CM_ENV
          echo "EOF" >> $CM_ENV
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Beta Tester
