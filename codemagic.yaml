workflows:
  ios-testflight:
    name: Comparadoo iOS TestFlight
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.comparadoo.app
      vars:
        APP_STORE_CONNECT_KEY_IDENTIFIER: ABC97SS28P
        APP_STORE_CONNECT_ISSUER_ID: 5e83f2da-7fb5-42f6-aa51-6d223426eb20
        BUNDLE_ID: com.comparadoo.app
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      app_store_connect:
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true
        beta_groups:
          - Beta Tester
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Add iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
